-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Users</title>
</head>

<body>

    <div th:replace="layout/navbar :: navbar"></div>
    
    <div class="container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">👥 User List</h2>
            <div>
                <a href="/ui/users/new" class="btn btn-primary">➕ Add User</a>
                <a href="/ui/home" class="btn btn-secondary">🏠 Dashboard</a>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.userId}"></td>
                        <td th:text="${u.name}"></td>
                        <td th:text="${u.email}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
