<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Bill</title>
</head>
<body>
<div th:replace="layout/navbar :: navbar"></div>
    <div class="container">
        <div class="card form-card">
            <h2>💰 Create Bill</h2>

            <form action="/ui/billing/save" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Parking Record ID</label>
                        <input type="text" name="recordId" placeholder="e.g. 1" required/>
                    </div>

                    <div class="form-group">
                        <label>Base Amount (₹)</label>
                        <input type="number" name="amount" min="1" step="0.01" placeholder="e.g. 150.00" required/>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/ui/billing" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Invoice</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
