<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Parking Slots</title>
</head>

<body>

    <div th:replace="layout/navbar :: navbar"></div>

    <div class="container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">🅿️ Parking Slots</h2>
            <div>
                <a th:if="${isAdmin}" href="/ui/slots/new" class="btn btn-primary">➕ Add Slot</a>
                <a href="/ui/home" class="btn btn-secondary">🏠 Dashboard</a>
            </div>
        </div>

        <div class="table-responsive">
            <table>

                <thead>
                    <tr>
                        <th>Slot ID</th>
                        <th>Slot Number</th>
                        <th>Slot Type</th>
                        <th>Floor No</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="slot : ${slots}">
                        <td th:text="${slot.slotId}"></td>
                        <td th:text="${slot.slotNumber}" style="font-weight: bold;"></td>
                        <td>
                            <span th:class="'badge badge-' + ${slot.slotType}" th:text="${slot.slotType}"></span>
                        </td>
                        <td th:text="${slot.floorNo}"></td>
                        <td>
                            <span th:class="'badge badge-' + ${slot.status}" th:text="${slot.status}"></span>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</body>
</html>
