<!--
  Author: althaf
  Description: Thymeleaf template rendering the user login form.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Smart Parking Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .login-card input {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border: 1.5px solid #cbd5e1 !important;
            font-size: 14.5px !important;
        }
        .login-card input::placeholder {
            color: #94a3b8 !important;
        }
        .login-card input:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18) !important;
            outline: none !important;
        }
    </style>
</head>
<body class="login-container">
 
<div class="login-card">
    <div style="text-align: center; margin-bottom: 28px;">
        <div style="font-size: 56px; margin-bottom: 10px; animation: bounce 2s infinite;">🚗</div>
        <h2 style="border-bottom: none; padding-bottom: 0; margin-bottom: 8px; justify-content: center; font-size: 26px; font-weight: 800;">Smart Parking System</h2>
        <p style="color: var(--text-muted); font-size: 14.5px;">Sign in to access your customized portal</p>
    </div>
 
    <form action="/login" method="post">
        <!-- Error Message if login fails -->
        <div th:if="${param.error}" style="background-color: var(--danger-light); color: var(--danger-dark); padding: 12px; border-radius: 8px; font-size: 13.5px; font-weight: 600; margin-bottom: 20px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2);">
            Invalid username or password.
        </div>
        
        <!-- Success Message after registration -->
        <div th:if="${param.registered}" style="background-color: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; font-size: 13.5px; font-weight: 600; margin-bottom: 20px; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2);">
            Registration successful! Please sign in.
        </div>
 
        <div class="form-group" style="margin-bottom: 18px;">
            <label style="font-weight: 600; font-size: 13px;">Username / Email</label>
            <input type="text" name="username" placeholder="Enter username or email" required style="padding: 12px 14px; border-radius: 8px; background-color: #ffffff !important; color: #0f172a !important;">
        </div>
 
        <div class="form-group" style="margin-bottom: 26px;">
            <label style="font-weight: 600; font-size: 13px;">Password</label>
            <input type="password" name="password" placeholder="Enter password" required style="padding: 12px 14px; border-radius: 8px; background-color: #ffffff !important; color: #0f172a !important;">
        </div>
 
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 15px; padding: 12px 20px; border-radius: 8px; font-weight: 700; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);">
            Sign In 🚪
        </button>

        <div style="text-align: center; margin-top: 20px; font-size: 14.5px; color: var(--text-muted);">
            New customer? <a href="/ui/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register here</a>
        </div>
    </form>
</div>
 
</body>
</html>
