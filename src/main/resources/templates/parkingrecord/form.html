<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Parking Entry</title>
</head>
<body>
<div th:replace="layout/navbar :: navbar"></div>
    <div class="container">
        <div class="card form-card">
            <h2>🚗 New Parking Entry</h2>

            <form action="/ui/records/save" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Vehicle</label>
                        <select name="vehicleId" required>
                            <option value="">-- Select Vehicle --</option>
                            <option th:each="v : ${vehicles}"
                                    th:value="${v.vehicleId}"
                                    th:text="${v.vehicleNumber + ' (' + v.vehicleType + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Select Parking Slot</label>
                        <select name="slotId" required>
                            <option value="">-- Select Slot --</option>
                            <option th:each="s : ${slots}"
                                    th:value="${s.slotId}"
                                    th:text="${s.slotNumber + ' - Floor ' + s.floorNo + ' (' + s.slotType + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group" style="display: none;">
                        <label>Status</label>
                        <select name="status">
                            <option value="ACTIVE" selected>ACTIVE</option>
                            <option value="COMPLETED">COMPLETED</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/ui/records" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Check In Vehicle</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
