<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reservations</title>
</head>

<body>

    <div th:replace="layout/navbar :: navbar"></div>

    <div class="container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">📅 Reservations</h2>
            <div>
                <a href="/ui/reservations/new" class="btn btn-primary">➕ New Reservation</a>
                <a href="/ui/home" class="btn btn-secondary">🏠 Dashboard</a>
            </div>
        </div>

        <div class="table-responsive">
            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Slot</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
 
                <tbody>
                    <tr th:each="r : ${reservations}">
                        <td th:text="${r.reservationId}"></td>
                        <td th:text="${r.user.name}"></td>
                        <td th:text="${r.parkingSlot.slotNumber}" style="font-weight: bold;"></td>
                        <td th:text="${#temporals.format(r.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${#temporals.format(r.endTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <span th:class="'badge badge-' + ${r.status}" th:text="${r.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/ui/reservations/edit/{id}(id=${r.reservationId})}" class="btn btn-warning btn-sm" style="padding: 4px 8px; font-size: 12px; margin-right: 4px; text-decoration: none; border-radius: 4px;">✏️ Edit</a>
                            <a th:href="@{/ui/reservations/delete/{id}(id=${r.reservationId})}" class="btn btn-danger btn-sm" style="padding: 4px 8px; font-size: 12px; text-decoration: none; border-radius: 4px;" onclick="return confirm('Are you sure you want to delete this reservation?');">🗑️ Delete</a>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</body>
</html>
