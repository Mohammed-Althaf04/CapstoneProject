<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Vehicle List</title>
</head>

<body>

<div th:replace="layout/navbar :: navbar"></div>

<div class="container">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">🚘 Vehicle List</h2>
        <div>
            <a href="/ui/vehicles/new" class="btn btn-primary">➕ Add Vehicle</a>
            <a href="/ui/home" class="btn btn-secondary">🏠 Dashboard</a>
        </div>
    </div>

    <div class="table-responsive">
        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Vehicle Number</th>
                <th>Type</th>
                <th>User Name</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="v : ${vehicles}">

                <td th:text="${v.vehicleId}"></td>
                <td th:text="${v.vehicleNumber}" style="font-family: monospace; font-weight: bold; font-size: 15px;"></td>
                <td>
                    <span th:class="'badge badge-' + ${v.vehicleType}" th:text="${v.vehicleType}"></span>
                </td>
                <td th:text="${v.user?.name}"></td>
                <td>
                    <a th:href="@{/ui/vehicles/edit/{id}(id=${v.vehicleId})}" class="btn btn-warning btn-sm" style="padding: 4px 8px; font-size: 12px; margin-right: 4px; text-decoration: none; border-radius: 4px;">✏️ Edit</a>
                    <a th:href="@{/ui/vehicles/delete/{id}(id=${v.vehicleId})}" class="btn btn-danger btn-sm" style="padding: 4px 8px; font-size: 12px; text-decoration: none; border-radius: 4px;" onclick="return confirm('Are you sure you want to delete this vehicle?');">🗑️ Delete</a>
                </td>

            </tr>
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
